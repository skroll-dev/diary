name: Deploy ai-proxy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'ai-proxy/**'
      - '.github/workflows/deploy-ai-proxy.yml'

env:
  PROJECT_ID: diary-6fa61
  REGION: europe-west3
  SERVICE: ai-proxy
  REGISTRY: europe-west3-docker.pkg.dev/diary-6fa61/ai-proxy/ai-proxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $REGISTRY:${{ github.sha }} -t $REGISTRY:latest ai-proxy/
          docker push $REGISTRY:${{ github.sha }}
          docker push $REGISTRY:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGISTRY:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GCP_PROJECT=$PROJECT_ID,GCP_REGION=$REGION,LOG_LEVEL=info \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 120 \
            --project $PROJECT_ID
