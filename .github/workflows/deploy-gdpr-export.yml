name: Deploy gdpr-export to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'gdpr-export/**'
      - '.github/workflows/deploy-gdpr-export.yml'

env:
  PROJECT_ID: diary-6fa61
  REGION: europe-west3
  SERVICE: gdpr-export
  REGISTRY: europe-west3-docker.pkg.dev/diary-6fa61/gdpr-export/gdpr-export

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $REGISTRY:${{ github.sha }} -t $REGISTRY:latest gdpr-export/
          docker push $REGISTRY:${{ github.sha }}
          docker push $REGISTRY:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGISTRY:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --project $PROJECT_ID
