name: ai_tagebuch
description: AI-gestütztes Sprach-Tagebuch – Codename Mathias
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Audio
  record: ^6.2.0
  audio_session: ^0.2.3

  # Lokale Datenbank (Offline-First)
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_app_check: ^0.4.4

  # HTTP (KI-Proxy)
  dio: ^5.6.0

  # Biometric Lock
  local_auth: ^3.0.1

  # UI
  flutter_animate: ^4.5.0
  go_router: ^17.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
