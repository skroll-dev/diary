name: ai_tagebuch
description: AI-gestütztes Sprach-Tagebuch – Codename Mathias
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio
  record: ^5.1.2
  audio_session: ^0.1.21

  # Lokale Datenbank (Offline-First)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.3.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_app_check: ^0.3.1+0

  # HTTP (KI-Proxy)
  dio: ^5.6.0

  # Biometric Lock
  local_auth: ^2.3.0

  # UI
  flutter_animate: ^4.5.0
  go_router: ^14.2.7
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
